<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plásticos Santuario | Gema Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --ps-green: #39B54A; 
            --ps-red: #ED1C24;
            --ps-white: #FFFFFF;
            --ps-dark: #212121;
            --vibras-gold: #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #39B54A 0%, #1b5e20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .gema-card {
            width: 100%;
            max-width: 400px;
            background: var(--ps-white);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            text-align: center;
            animation: gemaAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gemaAppear {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header {
            background: var(--ps-white);
            padding: 35px 20px 20px;
            border-bottom: 6px solid var(--ps-green);
        }

        .logo-main {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .info-header {
            background: #f4fcf4;
            padding: 12px;
            border-radius: 15px;
            margin: 0 10px;
            border: 1px dashed var(--ps-green);
        }

        .info-header p {
            font-size: 0.7rem;
            color: var(--ps-green);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px 25px 15px;
        }

        .action-circle {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .icon-box {
            width: 65px;
            height: 65px;
            background: var(--ps-green);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 15px rgba(57, 181, 74, 0.3);
            transition: 0.4s;
        }

        .action-circle:hover .icon-box {
            background: var(--ps-red);
            transform: translateY(-8px) rotate(360deg);
            box-shadow: 0 12px 20px rgba(237, 28, 36, 0.4);
        }

        .action-circle span {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--ps-dark);
        }

        .location-btn {
            margin: 10px 25px 20px;
            padding: 14px;
            background: var(--ps-red);
            color: white;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            display: block;
            box-shadow: 0 6px 12px rgba(237, 28, 36, 0.2);
            transition: 0.3s;
        }

        .location-btn:hover {
            background: #c11218;
            transform: scale(1.03);
        }

        .services-list {
            padding: 0 25px 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fdf8;
            padding: 16px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--ps-dark);
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid #eee;
            border-left: 5px solid var(--ps-green);
        }

        .service-item:hover {
            background: var(--ps-green);
            color: white;
            transform: translateX(10px);
            border-left: 5px solid var(--ps-dark);
        }

        .footer {
            padding: 30px 20px;
            background: #1a1a1a;
            color: #ffffff;
        }

        .vibras-logo {
            font-size: 1rem;
            color: var(--vibras-gold);
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .copyright {
            font-size: 0.65rem;
            line-height: 1.6;
            opacity: 0.7;
            font-weight: 300;
        }

        #status-gate { display: none; }
    </style>
</head>
<body>

    <div class="gema-card">
        <div id="status-gate" data-expire="2027-03-21"></div>

        <div class="header">
            <img src="1002039399.png" alt="Plásticos Santuario" class="logo-main">
            <div class="info-header">
                <p>Desechables • Bolsas • Salsamentaria • Aseo</p>
            </div>
        </div>

        <div class="action-grid">
            <a href="tel:+573214287719" class="action-circle">
                <div class="icon-box"><i class="fas fa-phone"></i></div>
                <span>Llamar</span>
            </a>
            <a href="https://wa.me/573214287719?text=Hola!%20Vengo%20de%20tu%20tarjeta%20digital." class="action-circle">
                <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/plasticossantuariocaucasia" class="action-circle">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
        </div>

        <a href="https://maps.app.goo.gl/yYv3E2p9T2D1B2D1" target="_blank" class="location-btn">
            <i class="fas fa-map-marker-alt"></i> AV. TRONCAL FRENTE AL ÉXITO
        </a>

        <div class="services-list">
            <a href="#" class="service-item">
                <span><i class="fas fa-box-open" style="margin-right:10px;"></i> Catálogo de Productos</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://www.facebook.com/share/1DgYuA2wyb/" target="_blank" class="service-item">
                <span><i class="fab fa-facebook-f" style="margin-right:15px;"></i> Facebook Oficial</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="mailto:plasticossantuariocaucasia@gmail.com" class="service-item">
                <span><i class="fas fa-envelope" style="margin-right:10px;"></i> Enviar Email</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer">
            <div class="vibras-logo">✨ VIBRAS POSITIVAS</div>
            <div class="copyright">
                APP DESARROLLADA POR VIBRAS POSITIVAS (311 770 0431)<br>
                DERECHOS DE AUTOR RESERVADOS © 2026<br>
                <strong>SUSCRIPCIÓN ANUAL ACTIVA</strong>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const gate = document.getElementById('status-gate');
            const expireDate = new Date(gate.getAttribute('data-expire'));
            const today = new Date();

            if (today > expireDate) {
                document.body.innerHTML = `
                    <div style="text-align:center; color:white; padding:50px; font-family:sans-serif; background:rgba(0,0,0,0.8); height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                        <i class="fas fa-lock" style="font-size:4rem; margin-bottom:20px; color:#FFD700;"></i>
                        <h2 style="margin-bottom:10px;">Gema Digital Protegida</h2>
                        <p style="opacity:0.8;">La suscripción anual de este servicio ha vencido.</p>
                        <br><a href="tel:3117700431" style="background:#FFD700; color:black; padding:15px 30px; border-radius:30px; text-decoration:none; font-weight:bold;">RENOVAR AHORA</a>
                    </div>`;
            }

            const items = document.querySelectorAll('.service-item');
            items.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    item.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, 300 + (index * 150));
            });
        })();
    </script>
</body>
</html>
