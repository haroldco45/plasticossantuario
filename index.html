<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plásticos Santuario | Gema Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* Colores extraídos de la tarjeta de Plásticos Santuario */
            --ps-green: #39B54A; 
            --ps-red: #ED1C24;
            --ps-white: #FFFFFF;
            --ps-dark: #2D2D2D;
            --vibras-gold: #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #e8f5e9;
            background: linear-gradient(135deg, #39B54A 0%, #1b5e20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* La Gema Card */
        .gema-card {
            width: 100%;
            max-width: 400px;
            background: var(--ps-white);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            text-align: center;
            animation: gemaAppear 0.8s ease-out;
        }

        @keyframes gemaAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header con el Logo del Repositorio */
        .header {
            background: var(--ps-white);
            padding: 30px 20px;
            border-bottom: 5px solid var(--ps-green);
        }

        .logo-main {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 15px;
        }

        .info-header {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 15px;
            margin: 0 20px;
        }

        .info-header p {
            font-size: 0.75rem;
            color: var(--ps-green);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Botones de Acción - Estilo Pinto */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px;
        }

        .action-circle {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-box {
            width: 65px;
            height: 65px;
            background: var(--ps-green);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 15px rgba(57, 181, 74, 0.3);
            transition: 0.3s;
        }

        .action-circle:hover .icon-box {
            background: var(--ps-red);
            transform: translateY(-5px);
        }

        .action-circle span {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--ps-dark);
        }

        /* Menú de Servicios - Estilo Hoyos */
        .services-list {
            padding: 0 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f8f1;
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--ps-dark);
            font-weight: 600;
            transition: 0.3s;
            border-left: 4px solid var(--ps-green);
        }

        .service-item:hover {
            background: var(--ps-green);
            color: white;
            transform: translateX(8px);
        }

        /* Dirección con Estilo */
        .location-tag {
            margin: 10px 25px;
            padding: 12px;
            background: var(--ps-red);
            color: white;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Footer Vibras Positivas */
        .footer {
            padding: 25px;
            background: #222;
            color: #888;
        }

        .vibras-logo {
            font-size: 0.9rem;
            color: var(--vibras-gold);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .copyright {
            font-size: 0.6rem;
            line-height: 1.4;
        }

        /* Control de Suscripción */
        #status-gate { display: none; }
    </style>
</head>
<body>

    <div class="gema-card">
        <div id="status-gate" data-expire="2027-03-21"></div>

        <div class="header">
            <img src="logo.png" alt="Plásticos Santuario" class="logo-main">
            <div class="info-header">
                <p>Desechables • Bolsas • Salsamentaria • Aseo</p>
            </div>
        </div>

        <div class="action-grid">
            <a href="tel:+573214287719" class="action-circle">
                <div class="icon-box"><i class="fas fa-phone"></i></div>
                <span>Llamar</span>
            </a>
            <a href="https://wa.me/573214287719?text=Hola!%20Vengo%20de%20tu%20tarjeta%20digital." class="action-circle">
                <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/plasticossantuario" class="action-circle">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
        </div>

        <div class="location-tag">
            <i class="fas fa-map-marker-alt"></i> AV. TRONCAL FRENTE AL ÉXITO
        </div>

        <div class="services-list">
            <a href="#" class="service-item">
                <span>Catálogo de Productos</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://www.facebook.com/share/1DgYuA2wyb/" class="service-item">
                <span>Facebook Oficial</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="mailto:plasticossantuariocaucasia@gmail.com" class="service-item">
                <span>Enviar Email</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer">
            <div class="vibras-logo">✨ VIBRAS POSITIVAS</div>
            <div class="copyright">
                APP DESARROLLADA POR VIBRAS POSITIVAS (311 770 0431)<br>
                DERECHOS DE AUTOR RESERVADOS © 2026<br>
                <strong>SUSCRIPCIÓN ANUAL ACTIVA</strong>
            </div>
        </div>
    </div>

    <script>
        // Sistema de Control de Suscripción Invisible
        (function() {
            const gate = document.getElementById('status-gate');
            const expireDate = new Date(gate.getAttribute('data-expire'));
            const today = new Date();

            if (today > expireDate) {
                document.body.innerHTML = `
                    <div style="text-align:center; color:white; padding:50px; font-family:sans-serif;">
                        <i class="fas fa-lock" style="font-size:3rem; margin-bottom:20px;"></i>
                        <h2>Suscripción Vencida</h2>
                        <p>Contacte a Vibras Positivas para reactivar su Gema Digital.</p>
                        <br><a href="tel:3117700431" style="color:#FFD700; text-decoration:none;">Llamar a Soporte</a>
                    </div>`;
            }

            // Animación de entrada para los elementos de la lista
            const items = document.querySelectorAll('.service-item');
            items.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateX(-20px)';
                setTimeout(() => {
                    item.style.transition = '0.5s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateX(0)';
                }, 400 + (index * 150));
            });
        })();
    </script>
</body>
</html>
