<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plásticos Santuario | Gema Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --ps-green: #39B54A; 
            --ps-red: #ED1C24;
            --ps-white: #FFFFFF;
            --ps-dark: #212121;
            --vibras-gold: #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #39B54A 0%, #1b5e20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .gema-card {
            width: 100%;
            max-width: 400px;
            background: var(--ps-white);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            overflow: hidden;
            text-align: center;
            animation: gemaAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gemaAppear {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header {
            background: var(--ps-white);
            padding: 35px 20px 20px;
            border-bottom: 6px solid var(--ps-green);
        }

        .logo-main {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin-bottom: 15px;
        }

        .info-header {
            background: #f4fcf4;
            padding: 12px;
            border-radius: 15px;
            margin: 0 10px;
            border: 1px dashed var(--ps-green);
        }

        .info-header p {
            font-size: 0.7rem;
            color: var(--ps-green);
            font-weight: 700;
            text-transform: uppercase;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px 25px 15px;
        }

        .action-circle {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-box {
            width: 65px; height: 65px;
            background: var(--ps-green);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 15px rgba(57, 181, 74, 0.3);
            transition: 0.4s;
        }

        .action-circle:hover .icon-box {
            background: var(--ps-red);
            transform: translateY(-8px);
        }

        .location-btn {
            margin: 10px 25px 20px;
            padding: 14px;
            background: var(--ps-red);
            color: white;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .location-btn:hover { background: #c11218; transform: scale(1.03); }

        .services-list { padding: 0 25px 30px; display: flex; flex-direction: column; gap: 12px; }

        .service-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #f8fdf8; padding: 16px 20px; border-radius: 18px;
            text-decoration: none; color: var(--ps-dark); font-weight: 600;
            transition: 0.3s; border-left: 5px solid var(--ps-green);
        }

        .service-item:hover {
            background: var(--ps-green); color: white; transform: translateX(10px);
        }

        .footer { padding: 30px 20px; background: #1a1a1a; color: #ffffff; }
        .vibras-logo { font-size: 1rem; color: var(--vibras-gold); font-weight: 800; margin-bottom: 8px; }
        .copyright { font-size: 0.65rem; line-height: 1.6; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="gema-card">
        <div class="header">
            <img src="1002039399.png" alt="Plásticos Santuario" class="logo-main">
            <div class="info-header">
                <p>Desechables • Bolsas • Salsamentaria • Aseo</p>
            </div>
        </div>

        <div class="action-grid">
            <a href="tel:+573214287719" class="action-circle">
                <div class="icon-box"><i class="fas fa-phone"></i></div>
                <span>Llamar</span>
            </a>
            <a href="https://wa.me/573214287719?text=Hola!%20Vengo%20de%20tu%20Gema%20Digital." class="action-circle">
                <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/plasticossantuariocaucasia" class="action-circle" target="_blank">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
        </div>

        <a href="https://maps.app.goo.gl/Pbt87rG88G3H45aN8" target="_blank" class="location-btn">
            <i class="fas fa-map-marker-alt"></i> AV. TRONCAL FRENTE AL ÉXITO
        </a>

        <div class="services-list">
            <a href="#" class="service-item">
                <span><i class="fas fa-shopping-cart" style="margin-right:10px;"></i> Ver Catálogo</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://www.facebook.com/plasticossantuario/" target="_blank" class="service-item">
                <span><i class="fab fa-facebook" style="margin-right:10px;"></i> Facebook</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer">
            <div class="vibras-logo">✨ VIBRAS POSITIVAS</div>
            <div class="copyright">
                APP DESARROLLADA POR VIBRAS POSITIVAS (311 770 0431)<br>
                CAUCASIA, ANTIOQUIA © 2026
            </div>
        </div>
    </div>

</body>
</html>
