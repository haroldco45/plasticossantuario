<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plásticos Santuario | Gema Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* Colores extraídos del logo de Plásticos Santuario */
            --ps-blue: #004AAD; /* Azul corporativo */
            --ps-yellow: #FFDE59; /* Amarillo brillante */
            --vibras-gold: #D4AC0D;
            --white: #ffffff;
            --bg-light: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--ps-blue);
            background: linear-gradient(135deg, var(--ps-blue) 0%, #002d6a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor Principal */
        .gema-card {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            text-align: center;
            animation: gemaEntry 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes gemaEntry {
            from { opacity: 0; transform: scale(0.8) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header con Logo */
        .header {
            background: var(--white);
            padding: 40px 20px 20px;
            position: relative;
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            object-fit: contain;
        }

        h1 { font-family: 'Montserrat'; color: var(--ps-blue); font-size: 1.4rem; margin-bottom: 5px; }
        .tagline { color: #666; font-size: 0.85rem; margin-bottom: 20px; font-weight: 300; }

        /* Botones de Acción Rápida (Estilo Pinto) */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            background: var(--ps-yellow);
            color: var(--ps-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 8px 15px rgba(255, 222, 89, 0.4);
            transition: 0.3s;
        }

        .action-btn:hover { transform: translateY(-5px); background: var(--ps-blue); color: var(--ps-yellow); }

        /* Listado de Servicios (Estructura Hoyos) */
        .menu-items { padding: 0 25px; display: flex; flex-direction: column; gap: 15px; }

        .item {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--ps-blue);
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .item:hover {
            background: var(--white);
            border-color: var(--ps-blue);
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .item i {
            width: 40px;
            height: 40px;
            background: var(--white);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            color: var(--ps-blue);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* Footer y Branding */
        .footer {
            margin-top: 40px;
            padding: 20px;
            background: #fdfdfd;
        }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-links a { color: #ccc; font-size: 1.4rem; transition: 0.3s; }
        .social-links a:hover { color: var(--ps-blue); }

        .vibras-brand {
            font-size: 0.65rem;
            color: #999;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .vibras-brand strong { color: var(--ps-blue); }

        /* Control de Suscripción Invisible */
        #subscription-status { display: none; }
    </style>
</head>
<body>

    <div class="gema-card">
        <div id="subscription-status" data-expiry="2027-03-21"></div>

        <div class="header">
            <div class="logo-container">
                <img src="https://i.ibb.co/vzYp6YV/logo-ps.png" alt="Plásticos Santuario">
            </div>
            <h1>PLÁSTICOS SANTUARIO</h1>
            <p class="tagline">Empaques y Desechables de Alta Calidad</p>
            
            <div class="action-bar">
                <a href="tel:+573117700431" class="action-btn"><i class="fas fa-phone"></i></a>
                <a href="https://wa.me/573117700431?text=Hola%20Plásticos%20Santuario!%20Deseo%20hacer%20un%20pedido." class="action-btn"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.google.com/maps/search/Caucasia+Antioquia" class="action-btn"><i class="fas fa-map-marker-alt"></i></a>
            </div>
        </div>

        <div class="menu-items">
            <a href="#" class="item">
                <i class="fas fa-box-open"></i>
                <span>Ver Catálogo de Productos</span>
            </a>
            <a href="https://www.instagram.com/plasticossantuariocaucasia" class="item">
                <i class="fab fa-instagram"></i>
                <span>Nuestras Novedades</span>
            </a>
            <a href="https://www.facebook.com/share/1DgYuA2wyb/" class="item">
                <i class="fab fa-facebook-f"></i>
                <span>Comunidad Facebook</span>
            </a>
            <a href="mailto:plasticossantuariocaucasia@gmail.com" class="item">
                <i class="fas fa-envelope"></i>
                <span>Enviar un Correo</span>
            </a>
        </div>

        <div class="footer">
            <div class="social-links">
                <a href="#"><i class="fab fa-tiktok"></i></a>
                <a href="#"><i class="fas fa-globe"></i></a>
            </div>
            <div class="vibras-brand">
                DESARROLLADO POR <strong>VIBRAS POSITIVAS</strong><br>
                CONTACTO: (+57) 311 770 0431<br>
                © 2026 Todos los derechos reservados.<br>
                <span style="font-size: 0.5rem; opacity: 0.5;">LICENCIA ANUAL ACTIVA</span>
            </div>
        </div>
    </div>

    <script>
        // Lógica de Control de Suscripción Invisible
        document.addEventListener('DOMContentLoaded', function() {
            const subData = document.getElementById('subscription-status');
            const expiryDate = new Date(subData.getAttribute('data-expiry'));
            const today = new Date();

            if (today > expiryDate) {
                document.body.innerHTML = `
                    <div style="color:white; text-align:center; padding:50px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; margin-bottom:20px;"></i>
                        <h2>Gema Digital en Mantenimiento</h2>
                        <p>Por favor contacte a Vibras Positivas para renovar su servicio.</p>
                        <br><a href="tel:3117700431" style="color:var(--ps-yellow)">Contactar Soporte</a>
                    </div>`;
            }

            // Animación de cascada para los botones del menú
            const items = document.querySelectorAll('.item');
            items.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    item.style.transition = 'all 0.4s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, 500 + (index * 150));
            });
        });
    </script>
</body>
</html>
